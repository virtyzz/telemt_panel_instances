name: Task / Chore
description: Internal task for maintainers
labels: [chore]
body:
  - type: markdown
    attributes:
      value: |
        For maintainer use. Describe the task and its rationale.
  - type: textarea
    id: description
    attributes:
      label: Task Description
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why
      description: Why is this task needed?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CI / Release
        - Documentation
        - Dependencies
        - Refactoring
        - Testing
        - Other

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Build binaries
        run: |
          # Remove 'v' prefix from tag (v0.2.0 -> 0.2.0)
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Build for x86_64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o telemt-panel-x86_64-linux \
            .

          # Build for aarch64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o telemt-panel-aarch64-linux \
            .

      - name: Package binaries
        run: |
          tar -czf telemt-panel-x86_64-linux-gnu.tar.gz telemt-panel-x86_64-linux
          tar -czf telemt-panel-aarch64-linux-gnu.tar.gz telemt-panel-aarch64-linux

      - name: Generate checksums
        run: |
          sha256sum telemt-panel-x86_64-linux-gnu.tar.gz > telemt-panel-x86_64-linux-gnu.sha256
          sha256sum telemt-panel-aarch64-linux-gnu.tar.gz > telemt-panel-aarch64-linux-gnu.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            telemt-panel-x86_64-linux-gnu.tar.gz
            telemt-panel-x86_64-linux-gnu.sha256
            telemt-panel-aarch64-linux-gnu.tar.gz
            telemt-panel-aarch64-linux-gnu.sha256

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
